<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <title>AR Gesture Menu Shopping</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <style>
    #webcam {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: -1;
    }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline></video>

  <script>
    const videoElement = document.getElementById('webcam');
    
    // Estados do Sistema: "SCANNING" ou "AUTORIZADO"
    let estadoSeguranca = "SCANNING";
    let tempoRostoDetetado = 0;

    // 1. Configurar Detetor de Mãos
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      // SÓ PROCESSA AS MÃOS SE JÁ ESTIVER AUTORIZADO PELO ROSTO
      if (estadoSeguranca !== "AUTORIZADO") return;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && results.multiHandedness) {
        const landmarks = results.multiHandLandmarks[0];
        const labelMao = results.multiHandedness[0].label;
        
        const thumb = landmarks[4];
        const index = landmarks[8];
        const pinky = landmarks[17];

        let visaoMao = "PALMA"; 
        if (labelMao === "Left") {
          visaoMao = (thumb.x > pinky.x) ? "PALMA" : "DORSO";
        } else {
          visaoMao = (thumb.x < pinky.x) ? "PALMA" : "DORSO";
        }

        const distancia = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
        const fezPinca = distancia < 0.045;

        if (typeof window.onHandTracked === 'function') {
          window.onHandTracked(index.x, index.y, visaoMao, fezPinca, "AUTORIZADO");
        }
      }
    });

    // 2. Configurar Detetor Facial
    const faceDetection = new FaceDetection({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({
      modelSelection: 0,
      minDetectionConfidence: 0.6
    });

    faceDetection.onResults((results) => {
      if (estadoSeguranca === "AUTORIZADO") return;

      if (results.detections && results.detections.length > 0) {
        tempoRostoDetetado += 1;
        
        // Envia feedback ao Flutter que está a escanear o rosto
        if (typeof window.onHandTracked === 'function') {
          window.onHandTracked(0.5, 0.5, "NENHUMA", false, "ESCANEANDO");
        }

        // Se detetar o rosto continuamente por ~25 frames (~1 segundo estável)
        if (tempoRostoDetetado > 25) {
          estadoSeguranca = "AUTORIZADO";
          if (typeof window.onHandTracked === 'function') {
            window.onHandTracked(0.5, 0.5, "NENHUMA", false, "APROVADO");
          }
          // Fecha o pipeline do rosto para poupar processador
          faceDetection.close(); 
        }
      } else {
        tempoRostoDetetado = 0; // Reset se perder o rosto
      }
    });

    // 3. Inicializar a Câmara Unificada
    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
      .then((stream) => {
        videoElement.srcObject = stream;
        const camera = new Camera(videoElement, {
          onFrame: async () => {
            if (estadoSeguranca === "SCANNING") {
              await faceDetection.send({ image: videoElement });
            } else {
              await hands.send({ image: videoElement });
            }
          },
          width: 1280, height: 720
        });
        camera.start();
      });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
