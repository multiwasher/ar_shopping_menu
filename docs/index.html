<!DOCTYPE html>
<html>
<head>
  <base href="/ar_shopping_menu/">
  <meta charset="UTF-8">
  <title>AR Gesture Menu Shopping</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  <style>
    #webcam {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: -1;
    }
    /* Camada visual de "A ESCANEAR" criada diretamente no HTML */
    #scanner-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 240px; height: 240px;
      border: 4px dashed #00e5ff;
      border-radius: 50%;
      box-shadow: 0 0 20px #00e5ff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00e5ff;
      font-family: sans-serif;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 10;
      box-sizing: border-box;
      animation: rodar 4s linear infinite;
    }
    @keyframes rodar {
      100% { transform: translate(-50%, -50%) rotate(360deg); }
    }
  </style>
</head>
<body>
  <video id="webcam" autoplay playsinline></video>
  <div id="scanner-overlay">SCAN FACIAL</div>

  <script>
    window.onHandTracked = null;
    const videoElement = document.getElementById('webcam');
    const overlay = document.getElementById('scanner-overlay');
    
    let estadoSeguranca = "SCANNING";
    let tempoRostoDetetado = 0;

    // 1. Configurar as Mãos
    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });
    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.7
    });

    hands.onResults((results) => {
      // SE NÃO PASSOU NO SCAN FACIAL, BLOQUEIA TOTALMENTE O FLUTTER
      if (estadoSeguranca !== "AUTORIZADO") return;

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0 && results.multiHandedness) {
        const landmarks = results.multiHandLandmarks[0];
        const labelMao = results.multiHandedness[0].label;
        
        const thumb = landmarks[4];
        const index = landmarks[8];
        const pinky = landmarks[17];

        let visaoMao = "PALMA"; 
        if (labelMao === "Left") {
          visaoMao = (thumb.x > pinky.x) ? "PALMA" : "DORSO";
        } else {
          visaoMao = (thumb.x < pinky.x) ? "PALMA" : "DORSO";
        }

        const distancia = Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2));
        const fezPinca = distancia < 0.045;

        // Só envia os dados quando a segurança der o OK
        if (typeof window.onHandTracked === 'function') {
          window.onHandTracked(index.x, index.y, visaoMao, fezPinca);
        }
      }
    });

    // 2. Configurar o Reconhecimento Facial
    const faceDetection = new FaceDetection({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
    });
    faceDetection.setOptions({
      modelSelection: 0,
      minDetectionConfidence: 0.6
    });

    faceDetection.onResults((results) => {
      if (estadoSeguranca === "AUTORIZADO") return;

      if (results.detections && results.detections.length > 0) {
        tempoRostoDetetado += 1;
        overlay.style.borderColor = "#9c27b0";
        overlay.style.color = "#9c27b0";
        overlay.innerText = "A VALIDAR...";

        // Rosto detetado por ~1 segundo seguido (aprox. 25 frames)
        if (tempoRostoDetetado > 25) {
          estadoSeguranca = "AUTORIZADO";
          overlay.style.display = "none"; // Esconde o círculo de scan
          faceDetection.close(); // Desliga a IA do rosto para poupar o PC
        }
      } else {
        tempoRostoDetetado = 0;
        overlay.style.borderColor = "#00e5ff";
        overlay.style.color = "#00e5ff";
        overlay.innerText = "SCAN FACIAL";
      }
    });

    // 3. Câmara Inteligente (Gere qual a IA que corre em tempo real)
    navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } })
      .then((stream) => {
        videoElement.srcObject = stream;
        const camera = new Camera(videoElement, {
          onFrame: async () => {
            if (estadoSeguranca === "SCANNING") {
              await faceDetection.send({ image: videoElement });
            } else {
              await hands.send({ image: videoElement });
            }
          },
          width: 1280, height: 720
        });
        camera.start();
      });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
